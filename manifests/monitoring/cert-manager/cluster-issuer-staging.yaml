apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # ACME server for Let's Encrypt staging
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: user@example.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx

# Notes:
# - Replace `email` with your contact email.
# - Ensure an Ingress controller (nginx or other) is installed and matches `ingress.class`.
# - For production use replace the `server` with Let's Encrypt production directory.
